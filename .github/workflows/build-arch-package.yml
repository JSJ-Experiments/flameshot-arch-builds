name: Build Arch Package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: archlinux:latest

    steps:
      - name: Install toolchain
        run: |
          pacman -Syu --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed \
            base-devel \
            cmake \
            git \
            kguiaddons \
            hicolor-icon-theme \
            ninja \
            qt6-base \
            qt6-svg \
            qt6-tools \
            sudo

      - name: Check out packaging repo
        uses: actions/checkout@v4

      - name: Resolve upstream head
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git ls-remote https://github.com/JSJ-Experiments/flameshot.git refs/heads/master | cut -f1)"
          short_sha="${sha:0:12}"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$sha" > upstream-commit.txt

      - name: Create build user
        run: |
          useradd --create-home --shell /bin/bash builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          runuser -u builder -- bash -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE"
            makepkg --syncdeps --noconfirm --cleanbuild --clean
          '

      - name: Collect build outputs
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist"
          shopt -s nullglob
          packages=( "$GITHUB_WORKSPACE"/*.pkg.tar.* )
          if (( ${#packages[@]} == 0 )); then
            echo "No package artifact was produced" >&2
            exit 1
          fi
          primary_package="$(basename "${packages[0]}")"
          echo "package_name=$primary_package" >> "$GITHUB_OUTPUT"
          for pkg in "${packages[@]}"; do
            base="$(basename "$pkg")"
            cp "$pkg" "$GITHUB_WORKSPACE/dist/$base"
            sha256sum "$pkg" > "$GITHUB_WORKSPACE/dist/$base.sha256"
          done
          cp "$GITHUB_WORKSPACE/upstream-commit.txt" "$GITHUB_WORKSPACE/dist/"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: |
            ${{ github.workspace }}/dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: upstream-${{ steps.upstream.outputs.short_sha }}
          name: Flameshot upstream ${{ steps.upstream.outputs.short_sha }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          prerelease: true
          body: |
            Arch Linux package build for:
            https://github.com/JSJ-Experiments/flameshot

            Upstream commit: `${{ steps.upstream.outputs.sha }}`
          files: |
            ${{ github.workspace }}/dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
